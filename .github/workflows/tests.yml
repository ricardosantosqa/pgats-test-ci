# Pipeline de Testes Automatizados - Ricardo Santos 
#
# CI Executado em:
#   • push para main ou develop
#   • pull_request contra main ou develop
#   • disparo manual (workflow_dispatch)
#   • agendamento 
# ──────────────────────────────────────────────────────────────────────────────

name: 🧪 Testes Automatizados

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

  # Execução manual pelo GitHub UI ou API
  workflow_dispatch:
    inputs:
      debug:
        description: 'Ativar modo verbose extra'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

  # Execução agendada: a cada 20 minutos
  schedule:
    - cron: '*/20 * * * *'

# ── Permissões mínimas necessárias ────────────────────────────────────────────
permissions:
  contents: read      # checkout do repositório
  checks: write       # publicar resultado de testes na aba Checks
  pull-requests: write  # comentar resultado em PRs

# ── Cancelar execuções duplicadas no mesmo branch/PR ──────────────────────────
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Executar testes e gerar relatório
    runs-on: ubuntu-latest

    steps:
      # 1. Código-fonte
      - name: 📥 Checkout código
        uses: actions/checkout@v6

      # 2. Ambiente Node.js com cache automático do npm
      - name: 🟢 Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      # 3. Instalar dependências
      #    Usamos "npm install" (em vez de "npm ci") porque o projeto evolui
      #    com frequência e o lockfile pode ficar temporariamente desatualizado
      #    em relação ao package.json. "npm install" resolve e atualiza o
      #    lockfile automaticamente, evitando falhas de sincronia no CI.
      - name: 📦 Instalar dependências
        run: npm install

      # 4. Testes + cobertura + relatório JUnit
      #    continue-on-error garante que os passos seguintes (publicação do
      #    relatório e upload de artefatos) executem mesmo se algum teste falhar.
      #    A falha real do job é refletida no step "Resultado final dos testes".
      - name: 🧪 Executar testes com cobertura
        id: run_tests
        continue-on-error: true
        run: |
          EXTRA=""
          if [ "${{ github.event.inputs.debug }}" = "true" ]; then EXTRA="--verbose"; fi
          npm test -- --coverage $EXTRA
        env:
          JEST_JUNIT_OUTPUT_DIR: '.'
          JEST_JUNIT_OUTPUT_NAME: 'junit.xml'

      # 5. Publica o relatório JUnit na aba "Checks" do GitHub
      - name: 📋 Publicar relatório de testes (Test Reporter)
        if: always()   # executa mesmo se os testes falharem
        uses: dorny/test-reporter@v3
        with:
          name: 'Relatório Jest'
          path: 'junit.xml'
          reporter: jest-junit
          fail-on-error: false   # não re-falha; o step "Resultado final" já sinaliza a falha

      # 6. Resumo rico no GitHub Step Summary
      - name: 📊 Resumo de cobertura no Step Summary
        if: always()
        run: |
          echo "## 🧪 Resultado dos Testes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.run_tests.outcome }}" = "success" ]; then
            echo "### ✅ Todos os testes passaram!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Há testes falhando — veja os logs acima." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch  | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit  | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner  | \`${{ runner.os }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Exibe resumo de cobertura se o JSON estiver disponível
          if [ -f coverage/coverage-summary.json ]; then
            echo "### 📈 Cobertura de Código" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Métrica | % Cobertura |" >> $GITHUB_STEP_SUMMARY
            echo "|---------|------------|" >> $GITHUB_STEP_SUMMARY
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              console.log('| Statements | ' + s.statements.pct + '% |');
              console.log('| Branches   | ' + s.branches.pct   + '% |');
              console.log('| Functions  | ' + s.functions.pct  + '% |');
              console.log('| Lines      | ' + s.lines.pct      + '% |');
            " >> $GITHUB_STEP_SUMMARY
          fi

      # 7. Artefatos: relatório de cobertura HTML + JUnit XML
      #    Retidos por 30 dias; baixáveis na aba "Artifacts" da execução
      - name: 📁 Upload artefatos de teste
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-report-${{ github.run_number }}
          path: |
            coverage/
            junit.xml
          retention-days: 30
          if-no-files-found: warn

      # 8. Comentário automático em Pull Requests
      - name: 💬 Comentar resultado no PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.run_tests.outcome }}' === 'success';
            const icon    = success ? '✅' : '❌';
            const status  = success ? 'PASSOU' : 'FALHOU';
            const sha     = context.sha.substring(0, 7);
            const run     = '${{ github.run_number }}';

            const body = [
              `## ${icon} Testes Automatizados — ${status}`,
              '',
              `| Campo | Valor |`,
              `|-------|-------|`,
              `| Status  | **${status}** |`,
              `| Commit  | \`${sha}\` |`,
              `| Execução | [#${run}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |`,
              '',
              success
                ? '> Os testes foram executados e **todos passaram**. O relatório de cobertura está disponível nos artefatos da execução.'
                : '> ⚠️ Um ou mais testes **falharam**. Revise os logs antes de realizar o merge.',
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body,
            });

      # 9. Resultado final: faz o job falhar de fato se os testes falharam.
      #    Executado por último para garantir que relatório, resumo, artefatos
      #    e comentário no PR já tenham sido publicados antes do job falhar.
      - name: 🚦 Resultado final dos testes
        if: always()
        run: |
          if [ "${{ steps.run_tests.outcome }}" != "success" ]; then
            echo "❌ A etapa de testes falhou. Verifique o relatório e os artefatos publicados."
            exit 1
          fi
          echo "✅ Testes executados com sucesso."
